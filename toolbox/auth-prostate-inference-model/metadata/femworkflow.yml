cwlVersion: v1.2
class: FEMWorkflow

id: prostate-cancer-workflow
label: Prostate Cancer ISUP-based Classification Workflow
doc: |
  Standalone workflow for prostate cancer type prediction (cisPCa vs csPCa).
  Executes the prostate-prediction bundle at a single site using ADC and T2W
  MRI DICOM series, a prostate gland segmentation mask, and clinical data
  (PSA, age). Outputs a JSON classification result and optional PNG
  visualisations with LIME or ANCHOR explainability.

# ---- Site slots ---------------------------------------------------------------
execution_sites:
  - alias: inference-site
    kind: single
    selection: user
    doc: Site where patient MRI data resides and inference will be executed.

# ---- Bundle bindings ----------------------------------------------------------
bundles:
  - bundle_id: prostate-prediction
    doc: Prostate cancer classification bundle (standalone mode).
    site_bindings:
      - role: worker
        site: inference-site

# ---- Workflow inputs (THE FORM) -----------------------------------------------
inputs:
  - id: input_data_dir
    type: Directory
    doc: |
      Patient imaging and clinical data directory (provided by the site's data store).
      Required structure:
        Series-<n>_adc/       — ADC DICOM slices (*.dcm)
        Series-<n>_t2w/       — T2W DICOM slices (*.dcm)
        gland-segmentation/   — prostate gland NIfTI mask (*.nii.gz)
        <clinical_template>.xls — clinical data spreadsheet
    required: true
    hidden: true
    scope: per_node
    targets:
      - bundle_id: prostate-prediction
        bundle_input_name: input_data_dir

  - id: user_vars_config
    type: File
    doc: |
      User configuration JSON. Upload a file with the following structure:
        {
          "model_name": "prostate_brf.joblib",
          "clinical_template": "<filename>.xls",
          "Debug": false,
          "save_intermediate_data": true,
          "explainability_mode": 1,
          "explain_method": "lime",
          "dwi_image_type": true
        }
      Allowed explain_method values: "lime", "anchor".
      Set explainability_mode to 0 to disable XAI.
    required: true
    hidden: false
    scope: global
    targets:
      - bundle_id: prostate-prediction
        bundle_input_name: user_vars_config

# ---- Workflow outputs ---------------------------------------------------------
outputs:
  - id: classification_result
    type: File
    doc: |
      JSON file with the predicted prostate cancer type and probability.
        pred_label: "cisPCa" (clinically insignificant) | "csPCa" (clinically significant)
        prob: probability percentage (e.g. "72.35%")
    source:
      bundle_id: prostate-prediction
      bundle_output_name: results_json

  - id: png_visualizations
    type: Directory
    doc: |
      Directory containing PNG exports of DICOM slices and, if XAI is enabled,
      LIME or ANCHOR explanation charts.
    source:
      bundle_id: prostate-prediction
      bundle_output_name: png_output_dir

# ---- Workflow-level metadata --------------------------------------------------
metadata:
  author: iladakig@auth.gr
  version: "1.0"
  apps:
    app_name: OpenVRE
    enabled: true
    version_control:
      repository: ""
      branch: main
  compliance:
    data_classification: private
    retention_policy:
      inputs_retention: session
      outputs_retention: 30d
      logs_retention: 30d
  security:
    access_control:
      - role: researcher
        permissions: [read, execute]
