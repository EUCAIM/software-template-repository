cwlVersion: v1.2
class: FEMTask

id: lung-metastasis-classifier
label: Lung Cancer Metastasis Risk Classification
doc: |
  FEM atomic task for lung cancer metastasis risk prediction.
  Uses CT radiomic features (5 RFE-selected features from tumour and rim
  regions), DICOM scanner metadata, and clinical TNM stage to run an
  SVM (RBF kernel) binary inference.
  Optionally generates LIME or ANCHOR XAI explanations.

requirements:
  - class: DockerRequirement
    # Replace with the actual image URL from the EUCAIM Harbor registry.
    dockerPull: harbor.eucaim.cancerimage.eu/processing-tools/auth-lung-metastasis-inference-model

  - class: ResourceRequirement
    coresMin: 2
    ramMin: 8192

  - class: InitialWorkDirRequirement
    listing:
      # Map CWL-staged inputs to the paths the tool expects inside the container.
      # The FEM platform is responsible for these volume bindings at runtime.
      - entryname: /tmp/input/data
        entry: $(inputs.input_data_dir)
        writable: false
      - entryname: /tmp/input/configs/user_vars.json
        entry: $(inputs.user_vars_config)
        writable: false
      - entryname: /tmp/output
        entry: ""
        writable: true

# Entrypoint of the standalone (non-API) Dockerfile_not_api.
# Executed from WORKDIR /usr/application; reads environment paths from
# src/config/environment_vars_platform.json (baked into the image).
baseCommand: [python3, src/main.py]

inputs:
  - id: input_data_dir
    type: Directory
    doc: |
      Patient CT imaging and clinical data directory.
      Mounted at /tmp/input/data. Expected contents (flat directory):
        *.dcm                 — CT DICOM slices (one series, no subdirectories)
        <patient_id>.nii.gz   — tumour segmentation mask (NIfTI)
        <clinical_template>.xls — clinical spreadsheet containing TNM stage
    required: true
    hidden: true
    source: connection

  - id: user_vars_config
    type: File
    doc: |
      User configuration JSON. Required fields:
        model_name (str)              — model filename inside /usr/application/model/
        clinical_template (str)       — .xls filename present in input_data_dir
        Debug (bool)                  — reuse cached radiomics CSV from a prior run
        save_intermediate_data (bool) — persist radiomics_results.csv and metadata.csv
        explainability_mode (int)     — 0 = disabled, 1 = enabled
        explain_method (str)          — "lime" or "anchor"
    required: true
    hidden: false
    source: user

outputs:
  - id: results_json
    type: File
    doc: |
      JSON classification result at /tmp/output/results.json.
        pred_label: "true"  — no metastasis predicted within 12 months (class 0)
        pred_label: "false" — distant metastasis predicted within 12 months (class 1)
        prob: probability as a percentage string (e.g. "81.20%")
    outputBinding:
      glob: /tmp/output/results.json

  - id: png_output_dir
    type: Directory
    doc: |
      PNG visualisations at /tmp/output/pngs/.
        *.png      — CT DICOM slice images
        *_xai.png  — LIME or ANCHOR explanation chart (if enabled)
    outputBinding:
      glob: /tmp/output/pngs

expectedExitCode: 0

metadata:
  author: iladakig@auth.gr
  version: "1.0"
  orchestrator:
    network: bridge
